<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 560" width="1240" height="560">
<style>
  text { font-family: "Satoshi", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .title { font: 800 30px "Satoshi", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #ffffff; }
  .subtitle { font: 600 17px "Satoshi", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #d7d7d9; }
  .panel { font: 700 18px "Satoshi", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #ffffff; letter-spacing: 1.2px; }
  .label { font: 700 16px "Satoshi", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #f2f2f2; }
  .secondary { font: 500 14px "Satoshi", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #a9a9ad; }
  .tick { font: 500 13px "Satoshi", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #85858b; }
  .value { font: 700 14px "Satoshi", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #f2f2f2; }
  .value-accent { font: 800 14px "Satoshi", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #ff6a1f; }
  .axis { font: 700 15px "Satoshi", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #d9d9dc; }
  .legend { font: 700 14px "Satoshi", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #f2f2f2; }
  .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; }
</style>
<defs><pattern id="dotgrid" width="8" height="8" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r="0.75" fill="#3a3a3a" opacity="0.7" /></pattern><marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#5b5b5f"/></marker></defs>
<rect width="100%" height="100%" fill="#080808" />
<text x="620" y="44" text-anchor="middle" font-size="28" font-weight="800" fill="#ffffff">Where turbo-graph sits on top of turbovec</text>
<text x="620" y="72" text-anchor="middle" font-size="17" fill="#d7d7d9">Same TurboQuant core; graph layer adds metadata, cache, and rerank</text>
<text x="330" y="100" text-anchor="middle" font-size="28" font-weight="800" fill="#ffffff">turbovec</text>
<text x="910" y="100" text-anchor="middle" font-size="16" font-weight="700" fill="#ff5a14">turbo-graph</text>
<rect x="95.0" y="108" width="470" height="60" rx="6" fill="#ff5a14" stroke="#ff8a4d" stroke-width="1.2"/>
<text x="330.0" y="134.0" text-anchor="middle" font-size="16" font-weight="600" fill="#ffffff">turbovec</text>
<text x="330.0" y="152.0" text-anchor="middle" font-size="13" fill="#f3f0ff">TurboQuant ANN core</text>
<line x1="318.0" y1="170" x2="342.0" y2="170" stroke="#5b5b5f" stroke-width="1.2"/>
<rect x="95.0" y="188" width="470" height="60" rx="6" fill="#ff5a14" stroke="#ffd0c8" stroke-width="1.2"/>
<text x="330.0" y="214.0" text-anchor="middle" font-size="16" font-weight="600" fill="#ffffff">allowlist / mask</text>
<text x="330.0" y="232.0" text-anchor="middle" font-size="13" fill="#f3f0ff">in-kernel candidate filter</text>
<line x1="318.0" y1="250" x2="342.0" y2="250" stroke="#5b5b5f" stroke-width="1.2"/>
<rect x="95.0" y="268" width="470" height="60" rx="6" fill="#ff5a14" stroke="#fff0aa" stroke-width="1.2"/>
<text x="330.0" y="294.0" text-anchor="middle" font-size="16" font-weight="600" fill="#ffffff">post-filter</text>
<text x="330.0" y="312.0" text-anchor="middle" font-size="13" fill="#f3f0ff">optional metadata pass</text>
<rect x="675.0" y="108" width="470" height="60" rx="6" fill="#ff5a14" stroke="#ff8a4d" stroke-width="1.2"/>
<text x="910.0" y="134.0" text-anchor="middle" font-size="16" font-weight="600" fill="#ffffff">turbovec</text>
<text x="910.0" y="152.0" text-anchor="middle" font-size="13" fill="#f3f0ff">same TurboQuant core</text>
<line x1="898.0" y1="170" x2="922.0" y2="170" stroke="#5b5b5f" stroke-width="1.2"/>
<rect x="675.0" y="188" width="470" height="60" rx="6" fill="#ff5a14" stroke="#c9f5ff" stroke-width="1.2"/>
<text x="910.0" y="214.0" text-anchor="middle" font-size="16" font-weight="600" fill="#ffffff">GraphMemoryIndex</text>
<text x="910.0" y="232.0" text-anchor="middle" font-size="13" fill="#f3f0ff">graph + metadata + cache</text>
<line x1="898.0" y1="250" x2="922.0" y2="250" stroke="#5b5b5f" stroke-width="1.2"/>
<rect x="675.0" y="268" width="470" height="60" rx="6" fill="#ff5a14" stroke="#fff0aa" stroke-width="1.2"/>
<text x="910.0" y="294.0" text-anchor="middle" font-size="16" font-weight="600" fill="#ffffff">query assembly</text>
<text x="910.0" y="312.0" text-anchor="middle" font-size="13" fill="#f3f0ff">graph + tags + source + time + candidates</text>
<line x1="898.0" y1="330" x2="922.0" y2="330" stroke="#5b5b5f" stroke-width="1.2"/>
<rect x="675.0" y="348" width="470" height="60" rx="6" fill="#ff5a14" stroke="#ffd0c8" stroke-width="1.2"/>
<text x="910.0" y="374.0" text-anchor="middle" font-size="16" font-weight="600" fill="#ffffff">rerank + telemetry</text>
<text x="910.0" y="392.0" text-anchor="middle" font-size="13" fill="#f3f0ff">optional second stage</text>
<line x1="580" y1="248.0" x2="660" y2="248.0" stroke="#a9a9ad" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="620" y="238" text-anchor="middle" font-size="17" fill="#d7d7d9">shared core</text>
<rect x="40" y="444" width="840" height="52" rx="8" fill="#171717" stroke="#323232"/>
<text x="60" y="464" font-size="14" fill="#a9a9ad">turbo-graph does not replace allowlist/mask; it composes graph constraints with kernel filters.</text>
<text x="60" y="482" font-size="14" fill="#a9a9ad">Use turbovec alone for pure ANN; add turbo-graph when you need structured memory over vectors.</text>
</svg>