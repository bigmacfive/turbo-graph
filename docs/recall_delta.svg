<text x="120" y="376" text-anchor="end" font-size="14" fill="#d9d9dc">GloVe 2-bit</text>
<text x="548.0" y="376" text-anchor="end" font-size="16" font-weight="600" fill="#ffffff">-0.06 pp</text>
