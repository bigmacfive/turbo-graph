<text x="550" y="70" text-anchor="middle" font-size="17" fill="#d7d7d9">Shared turbo-graph / turbovec core | positive = TurboQuant higher recall</text>
<line x1="585.0" y1="112" x2="585.0" y2="542" stroke="#5b5b5f" stroke-width="1"/>
