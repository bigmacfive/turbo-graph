name: Release (crates.io)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  crates-io:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: crates-io
      url: https://crates.io/crates/turbo-graph
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Install openblas for cargo publish verification
        run: sudo apt-get update && sudo apt-get install -y libopenblas-dev pkg-config
      - name: Check tag matches crate version
        shell: bash
        run: |
          crate_version="$(sed -n 's/^version = "\(.*\)"/\1/p' turbo-graph/Cargo.toml | head -n 1)"
          test "${GITHUB_REF_NAME}" = "v${crate_version}"
      - name: Format check
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy -p turbo-graph --all-targets -- -D warnings
      - name: Test
        run: cargo test -p turbo-graph --release
      - name: Package dry run
        run: cargo package -p turbo-graph
      - name: Publish turbo-graph with token
        if: env.CARGO_REGISTRY_TOKEN != ''
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p turbo-graph
      - name: Authenticate with crates.io trusted publishing
        if: env.CARGO_REGISTRY_TOKEN == ''
        id: auth
        uses: rust-lang/crates-io-auth-action@v1
      - name: Publish turbo-graph with trusted publishing
        if: env.CARGO_REGISTRY_TOKEN == ''
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish -p turbo-graph
