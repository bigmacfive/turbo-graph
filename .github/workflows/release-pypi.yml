name: Release (PyPI)

on:
  push:
    tags:
      - "py-v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  version:
    name: Version check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check tag and package versions
        shell: bash
        run: |
          python_version="$(sed -n 's/^version = "\(.*\)"/\1/p' turbo-graph-python/pyproject.toml | head -n 1)"
          python_crate_version="$(sed -n 's/^version = "\(.*\)"/\1/p' turbo-graph-python/Cargo.toml | head -n 1)"
          core_crate_version="$(sed -n 's/^version = "\(.*\)"/\1/p' turbo-graph/Cargo.toml | head -n 1)"
          test "${python_version}" = "${python_crate_version}"
          test "${python_version}" = "${core_crate_version}"
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            test "${GITHUB_REF_NAME}" = "py-v${python_version}"
          fi

  linux:
    name: Linux ${{ matrix.target }}
    # Build each target on a runner of its own architecture, so the build
    # is native and the in-container `apt-get install libopenblas-dev`
    # picks up the right openblas variant without cross-compile gymnastics.
    runs-on: ${{ matrix.target == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    needs: version
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: manylinux_2_28
          args: --release --out dist
          working-directory: turbo-graph-python
          before-script-linux: |
            if command -v dnf >/dev/null 2>&1; then
              dnf install -y openblas-devel openssl-devel pkgconfig
            elif command -v yum >/dev/null 2>&1; then
              yum install -y openblas-devel openssl-devel pkgconfig
            elif command -v apt-get >/dev/null 2>&1; then
              apt-get update && apt-get install -y libopenblas-dev libssl-dev pkg-config
            else
              echo "No supported package manager found" && exit 1
            fi
      # Install the freshly-built wheel and run the core test suite on
      # the runner (outside the build container). This catches linkage
      # regressions that produce structurally-correct .so files which
      # fail at Python import time — exactly the class of bug that was
      # silently shipping in Linux wheels until this PR.
      - name: Install wheel and smoke test
        shell: bash
        working-directory: turbo-graph-python
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
          python -m pip install dist/*.whl
          python -m pytest \
            tests/test_index.py \
            tests/test_id_map.py \
            tests/test_filtering.py \
            tests/test_graph_memory.py \
            -v
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: turbo-graph-python/dist

  macos:
    name: macOS aarch64
    runs-on: macos-14
    needs: version
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: aarch64
          args: --release --out dist
          working-directory: turbo-graph-python
      - name: Install wheel and run tests
        shell: bash
        working-directory: turbo-graph-python
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
          python -m pip install dist/*.whl
          python -m pytest \
            tests/test_index.py \
            tests/test_id_map.py \
            tests/test_filtering.py \
            tests/test_graph_memory.py \
            -v
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-aarch64
          path: turbo-graph-python/dist

  windows:
    name: Windows x64
    runs-on: windows-latest
    needs: version
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x64
          args: --release --out dist
          working-directory: turbo-graph-python
      - name: Install wheel and run tests
        shell: bash
        working-directory: turbo-graph-python
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
          python -m pip install dist/*.whl
          python -m pytest \
            tests/test_index.py \
            tests/test_id_map.py \
            tests/test_filtering.py \
            tests/test_graph_memory.py \
            -v
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x64
          path: turbo-graph-python/dist

  sdist:
    name: sdist
    runs-on: ubuntu-latest
    needs: version
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: turbo-graph-python
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: turbo-graph-python/dist

  release:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [version, linux, macos, windows, sdist]
    if: startsWith(github.ref, 'refs/tags/py-v')
    environment:
      name: pypi
      url: https://pypi.org/project/turbo-graph
    env:
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
      USE_TRUSTED_PUBLISHING: ${{ vars.PYPI_TRUSTED_PUBLISHING }}
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish to PyPI with token
        if: env.PYPI_API_TOKEN != ''
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          password: ${{ secrets.PYPI_API_TOKEN }}
      - name: Publish to PyPI with trusted publishing
        if: env.PYPI_API_TOKEN == '' && env.USE_TRUSTED_PUBLISHING == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
      - name: Registry publishing not configured
        if: env.PYPI_API_TOKEN == '' && env.USE_TRUSTED_PUBLISHING != 'true'
        run: |
          {
            echo "## PyPI publish skipped"
            echo
            echo "Set the PYPI_API_TOKEN repository secret to publish immediately."
            echo "Or configure a PyPI Trusted Publisher and set PYPI_TRUSTED_PUBLISHING=true."
          } >> "$GITHUB_STEP_SUMMARY"
